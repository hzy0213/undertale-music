<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mp3的音樂</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FDF5E6; /* 溫暖的米色 (Old Lace) */
            --frame-color: #5C4033; /* 木質棕 */
            --accent-color: #2E8B57; /* 森林深綠 */
            --progress-color: #87CEEB; /* 天空藍 */
            --highlight-color: #D0F0C0; /* 淺綠色 (Tea Green) */
            --text-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>'); /* 淡淡的紙張紋理 */
            font-family: 'Kosugi Maru', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .player-container {
            background-color: #ffffff;
            width: 350px;
            border: 8px solid var(--frame-color);
            border-radius: 40px; /* 非常圓潤的邊角 */
            padding: 25px;
            box-shadow: 0 15px 35px rgba(92, 64, 51, 0.25); /* 柔和的棕色陰影 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h2 {
            color: var(--frame-color);
            margin: 5px 0 0 0;
            font-size: 16px;
            font-weight: normal;
        }

        .cover-art {
            width: 150px;
            height: 150px;
            background-color: var(--bg-color);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px dashed var(--accent-color);
            margin-bottom: 20px;
            font-size: 80px;
            color: var(--accent-color);
            transition: all 0.3s ease;
        }

        .track-info {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--frame-color);
            margin-bottom: 20px;
            min-height: 30px;
        }

        /* 搜尋列 */
        .search-container {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }
        .search-container input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid var(--frame-color);
            font-family: 'Kosugi Maru', sans-serif;
            outline: none;
        }

        /* 進度條 */
        .progress-container {
            width: 100%;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: var(--progress-color);
            width: 0%;
            border-radius: 5px;
            pointer-events: none;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
            color: var(--frame-color);
        }

        /* 播放控制按鈕 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
        }
        .controls button {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--frame-color);
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }
        .controls button:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }
        .controls .play-btn {
            font-size: 40px;
            color: var(--accent-color);
        }
        .controls .active-mode {
            color: var(--accent-color);
        }

        /* 音量控制 */
        .volume-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
            color: var(--frame-color);
            margin-bottom: 20px;
        }
        .volume-container input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
        }

        /* 播放清單 */
        .playlist-container {
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            border-top: 2px solid var(--bg-color);
            padding-top: 10px;
        }
        /* 隱藏卷軸使畫面乾淨 */
        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-thumb { background: var(--bg-color); border-radius: 10px; }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 16px;
        }
        .playlist-item:hover {
            background-color: var(--bg-color);
        }
        .playlist-item.active {
            background-color: var(--highlight-color);
            color: var(--accent-color);
            font-weight: bold;
        }
        .leaf-icon {
            margin-right: 10px;
            display: none;
            color: var(--accent-color);
        }
        .playlist-item.active .leaf-icon {
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <h1>🌿 leo 🍃</h1>
        <h2>MP3撥放器</h2>
    </div>

    <div class="cover-art" id="coverArt">
        <i class="fa-solid fa-seedling" id="coverIcon"></i>
    </div>

    <div class="track-info" id="trackTitle">Track --</div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜尋編號或檔案路徑...">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button id="shuffleBtn" title="隨機播放"><i class="fa-solid fa-shuffle"></i></button>
        <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
        <button id="playBtn" class="play-btn"><i class="fa-solid fa-circle-play"></i></button>
        <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
        <button id="repeatBtn" title="不循環"><i class="fa-solid fa-repeat"></i> <span id="repeatBadge" style="font-size:10px;"></span></button>
    </div>

    <div class="volume-container">
        <i class="fa-solid fa-volume-down"></i>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        <i class="fa-solid fa-volume-up"></i>
    </div>

    <div class="playlist-container" id="playlist">
        </div>

    <audio id="audio"></audio>
</div>

<script>
    // 使用 jsDelivr CDN 讀取 GitHub 上的音樂檔案，解決無法播放的問題
    const musicFiles = [
        "https://cdn.jsdelivr.net/gh/hzy0213/undertale-music@main/song1.mp3",
        "https://cdn.jsdelivr.net/gh/hzy0213/undertale-music@main/song2.mp3",
        "https://cdn.jsdelivr.net/gh/hzy0213/undertale-music@main/song3.mp3"
    ];

    // 大自然隨機圖示
    const natureIcons = ['fa-seedling', 'fa-cloud', 'fa-sun', 'fa-tree', 'fa-leaf', 'fa-canadian-maple-leaf', 'fa-clover'];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const repeatBadge = document.getElementById('repeatBadge');
    
    const progressContainer = document.getElementById('progressBar');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');
    
    const volumeSlider = document.getElementById('volumeSlider');
    const searchInput = document.getElementById('searchInput');
    const playlistContainer = document.getElementById('playlist');
    const trackTitle = document.getElementById('trackTitle');
    const coverIcon = document.getElementById('coverIcon');

    let currentTrackIndex = -1; // 當前播放中的實際索引
    let isPlaying = false;
    let isShuffle = false;
    let repeatMode = 0; // 0: 不循環, 1: 全部循環, 2: 單曲循環

    // 初始化設定
    function init() {
        audio.volume = volumeSlider.value;
        renderPlaylist();
    }

    // 格式化編號為兩位數
    function formatNumber(num) {
        return num.toString().padStart(2, '0');
    }

    // 格式化時間 (秒 -> mm:ss)
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // 渲染播放清單 (支援搜尋過濾)
    function renderPlaylist(filterText = "") {
        playlistContainer.innerHTML = '';
        
        musicFiles.forEach((file, index) => {
            const trackNum = formatNumber(index + 1);
            
            // 搜尋條件：編號 或 隱藏的原始路徑
            if (filterText && !trackNum.includes(filterText) && !file.toLowerCase().includes(filterText.toLowerCase())) {
                return; // 不符合搜尋字眼則跳過
            }

            const item = document.createElement('div');
            item.className = 'playlist-item';
            if (index === currentTrackIndex) item.classList.add('active');
            
            // 加入小葉子與純編號
            item.innerHTML = `
                <i class="fa-solid fa-leaf leaf-icon"></i>
                <span>${trackNum}</span>
            `;
            
            item.addEventListener('click', () => {
                loadTrack(index);
                playTrack();
            });

            playlistContainer.appendChild(item);
        });
    }

    // 載入特定歌曲
    function loadTrack(index) {
        currentTrackIndex = index;
        audio.src = musicFiles[index];
        
        // 更新大標題：Track + 兩位數編號
        trackTitle.innerText = `Track ${formatNumber(index + 1)}`;
        
        // 隨機切換封面圖示
        const randomIcon = natureIcons[Math.floor(Math.random() * natureIcons.length)];
        coverIcon.className = `fa-solid ${randomIcon}`;

        // 更新清單的高亮狀態
        renderPlaylist(searchInput.value);
    }

    // 播放
    function playTrack() {
        if (currentTrackIndex === -1) loadTrack(0); // 防呆：如果沒選過歌就播第一首
        isPlaying = true;
        audio.play();
        playBtn.innerHTML = '<i class="fa-solid fa-circle-pause"></i>';
    }

    // 暫停
    function pauseTrack() {
        isPlaying = false;
        audio.pause();
        playBtn.innerHTML = '<i class="fa-solid fa-circle-play"></i>';
    }

    // 播放/暫停 切換
    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            pauseTrack();
        } else {
            playTrack();
        }
    });

    // 上一首
    function prevSong() {
        if (isShuffle) {
            loadTrack(Math.floor(Math.random() * musicFiles.length));
        } else {
            let newIndex = currentTrackIndex - 1;
            if (newIndex < 0) newIndex = musicFiles.length - 1;
            loadTrack(newIndex);
        }
        playTrack();
    }
    prevBtn.addEventListener('click', prevSong);

    // 下一首
    function nextSong() {
        if (isShuffle) {
            loadTrack(Math.floor(Math.random() * musicFiles.length));
        } else {
            let newIndex = currentTrackIndex + 1;
            if (newIndex > musicFiles.length - 1) newIndex = 0;
            loadTrack(newIndex);
        }
        playTrack();
    }
    nextBtn.addEventListener('click', nextSong);

    // 進度條更新
    audio.addEventListener('timeupdate', () => {
        const { duration, currentTime } = audio;
        if (!isNaN(duration)) {
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            currentTimeEl.innerText = formatTime(currentTime);
            durationTimeEl.innerText = formatTime(duration);
        }
    });

    // 點擊進度條跳轉
    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });

    // 音量控制
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // 隨機播放切換
    shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active-mode', isShuffle);
    });

    // 重複播放切換
    repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3; // 0 -> 1 -> 2 -> 0
        if (repeatMode === 0) {
            repeatBtn.classList.remove('active-mode');
            repeatBtn.title = "不循環";
            repeatBadge.innerText = "";
        } else if (repeatMode === 1) {
            repeatBtn.classList.add('active-mode');
            repeatBtn.title = "全部循環";
            repeatBadge.innerText = "All";
        } else if (repeatMode === 2) {
            repeatBtn.classList.add('active-mode');
            repeatBtn.title = "單曲循環";
            repeatBadge.innerText = "1";
        }
    });

    // 歌曲結束時的邏輯
    audio.addEventListener('ended', () => {
        if (repeatMode === 2) {
            // 單曲循環
            playTrack();
        } else if (isShuffle) {
            // 隨機
            nextSong();
        } else {
            // 一般循序
            if (currentTrackIndex === musicFiles.length - 1) {
                if (repeatMode === 1) {
                    nextSong(); // 全部循環，回到第一首
                } else {
                    // 不循環，停在最後一首結束
                    pauseTrack();
                }
            } else {
                nextSong();
            }
        }
    });

    // 搜尋功能：即時比對編號或隱藏的檔案路徑
    searchInput.addEventListener('input', (e) => {
        renderPlaylist(e.target.value);
    });

    // 啟動初始化
    init();

</script>
</body>
</html>
